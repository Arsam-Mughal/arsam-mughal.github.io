<!DOCTYPE html>

<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Playable Games</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="top-nav">
        <div class="nav-content">
            <a href="index.html" class="nav-logo">
                <span class="bracket">&lt;</span>
                <span class="logo-name">AM</span>
                <span class="bracket">/&gt;</span>
            </a>
        </div>
    </nav>


    <div class="container">
        <div class="section-header">
            <h1 class="section-title">
                Playable Ad Showcase
            </h1>
        </div>
        <p style="color:var(--text-muted);margin-bottom:40px;">
            Explore a collection of interactive HTML5 playable ads built with Cocos Creator, designed to showcase
            engaging gameplay, polished interactions, and optimized web performance.
        </p>
        <div class="games-grid">
            <a href="game.html?game=snake" class="game-card">
                <img src="images/snake.jpg">
                <h3>Snake</h3>
                <p>JavaScript • Canvas</p>
            </a>
            <a href="game.html?game=pong" class="game-card">
                <img src="images/pong.jpg">
                <h3>Pong</h3>
                <p>Multiplayer</p>
            </a>
            <a href="game.html?game=flappy" class="game-card">
                <img src="images/flappy.jpg">
                <h3>Flappy Bird</h3>
                <p>Phaser</p>
            </a>
        </div>
    </div>
</body>

</html>
